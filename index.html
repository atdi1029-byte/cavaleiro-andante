<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07100a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cavaleiro Andante</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ── HEADER ── -->
  <header id="header">
    <div class="header-inner">
      <div class="logo-row">
        <img src="logo.png" alt="" class="logo-img" onerror="this.style.display='none'">
        <div class="logo-text">
          <span class="logo-name">Cavaleiro</span>
          <span class="logo-name accent">Andante</span>
        </div>
      </div>
      <button class="hdr-btn" id="taste-btn" title="Taste Profile">⚗️</button>
    </div>
    <div class="location-bar">
      <span class="location-dot"></span>
      <span id="location-text">Pasadena, MD</span>
      <button id="use-location-btn" class="loc-btn">Use My Location</button>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input"
        placeholder="Search any area… (Shenandoah, Annapolis…)"
        autocomplete="off">
      <button id="search-btn">→</button>
    </div>
  </header>

  <!-- ── CATEGORY CARDS ── -->
  <div id="cat-scroll">
    <div id="cat-row">
      <button class="cat-card active" data-filter="all">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&h=180&q=75&auto=format&fit=crop" alt="All" loading="lazy">
        <div class="cat-overlay"></div>
        <span class="cat-label">🗺️ All</span>
      </button>
      <button class="cat-card" data-filter="hike">
        <img src="https://images.unsplash.com/photo-1551632811-561732d1e306?w=300&h=180&q=75&auto=format&fit=crop" alt="Hike" loading="lazy">
        <div class="cat-overlay"></div>
        <span class="cat-label">🥾 Hike</span>
      </button>
      <button class="cat-card" data-filter="trail">
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=300&h=180&q=75&auto=format&fit=crop" alt="Trail" loading="lazy">
        <div class="cat-overlay"></div>
        <span class="cat-label">🌿 Trail</span>
      </button>
      <button class="cat-card" data-filter="park">
        <img src="https://images.unsplash.com/photo-1448375240586-882707db888b?w=300&h=180&q=75&auto=format&fit=crop" alt="Park" loading="lazy">
        <div class="cat-overlay"></div>
        <span class="cat-label">🌲 Park</span>
      </button>
      <button class="cat-card" data-filter="waterfall">
        <img src="https://images.unsplash.com/photo-1508193638397-1c4234db14d8?w=300&h=180&q=75&auto=format&fit=crop" alt="Waterfall" loading="lazy">
        <div class="cat-overlay"></div>
        <span class="cat-label">💧 Waterfall</span>
      </button>
      <button class="cat-card" data-filter="water">
        <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=300&h=180&q=75&auto=format&fit=crop" alt="Lake" loading="lazy">
        <div class="cat-overlay"></div>
        <span class="cat-label">🌊 Lake</span>
      </button>
      <button class="cat-card" data-filter="run">
        <img src="https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=300&h=180&q=75&auto=format&fit=crop" alt="Run" loading="lazy">
        <div class="cat-overlay"></div>
        <span class="cat-label">🏃 Run</span>
      </button>
      <button class="cat-card" data-filter="gems">
        <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=300&h=180&q=75&auto=format&fit=crop" alt="Gems" loading="lazy">
        <div class="cat-overlay"></div>
        <span class="cat-label">💎 Gems</span>
      </button>
      <button class="cat-card" data-filter="saved">
        <img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=300&h=180&q=75&auto=format&fit=crop" alt="My Places" loading="lazy">
        <div class="cat-overlay"></div>
        <span class="cat-label">❤️ My Places</span>
      </button>
    </div>
  </div>

  <!-- ── TOOLBAR ── -->
  <div id="toolbar">
    <div class="view-toggle">
      <button id="list-view-btn" class="view-btn active">List</button>
      <button id="map-view-btn" class="view-btn">Map</button>
    </div>
    <span id="count-label" class="count-label"></span>
    <button id="refresh-btn" class="reload-btn">↺</button>
  </div>

  <!-- ── DISTANCE + SURPRISE BAR ── -->
  <div id="discover-bar">
    <div class="dist-pills">
      <button class="dist-pill active" data-miles="9999">All</button>
      <button class="dist-pill" data-miles="30">30 mi</button>
      <button class="dist-pill" data-miles="60">60 mi</button>
      <button class="dist-pill" data-miles="120">2 hr</button>
    </div>
    <button id="unseen-btn">✨ Unseen</button>
    <button id="surprise-btn">🎲 Surprise Me</button>
  </div>

  <!-- ── LOADING ── -->
  <div id="loading" class="hidden">
    <div class="spinner"></div>
    <p>Finding places near you…</p>
  </div>

  <!-- ── ERROR ── -->
  <div id="error-state" class="hidden">
    <div class="empty-state">
      <span class="empty-icon">😕</span>
      <h3>Couldn't load places</h3>
      <p id="error-msg">Check your connection and try again.</p>
      <button onclick="loadPlaces()" class="retry-btn">Try Again</button>
    </div>
  </div>

  <!-- ── LIST VIEW ── -->
  <div id="list-view">
    <div id="places-list"></div>
  </div>

  <!-- ── MAP VIEW ── -->
  <div id="map-view" class="hidden">
    <div id="map"></div>
  </div>

  <!-- ── PLACE DETAIL MODAL ── -->
  <div id="modal-overlay" class="hidden">
    <div id="place-modal">
      <div class="modal-handle"></div>
      <button id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ── TASTE PANEL ── -->
  <div id="taste-panel" class="hidden">
    <div class="panel-header">
      <h2>Taste Profile</h2>
      <button class="taste-close-btn" id="taste-close">✕</button>
    </div>
    <p class="panel-sub">
      The app learns what you like as you save and skip places.
      Higher score = shown first.
    </p>
    <div id="taste-content"></div>
  </div>

</div><!-- #app -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="places.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
